<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新入社員サバイバル</title>
    <style>
        /* =========================================
           CSS: 100dvhで固定したDS風レイアウト
           ========================================= */
        * { box-sizing: border-box; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; user-select: none; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; background-color: #222; display: flex; flex-direction: column; overflow: hidden; }

        /* 上画面（ゲーム画面・ストーリー） */
        #top-screen {
            flex: 1;
            background-color: #f8f9fa;
            position: relative;
            border-bottom: 4px solid #000;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        #bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #e0f7fa, #b2ebf2);
            /* 画像を綺麗に画面いっぱいに表示するための設定 */
            background-size: cover !important; 
            background-position: center !important;
            z-index: 1;
            opacity: 0.6; transition: background 0.5s;
        }

        #character-area {
            flex: 1; z-index: 2; display: flex; align-items: flex-end; justify-content: center;
        }

        /* 登場人物のアイコン表示 */
        .character {
            width: 120px; height: 120px; background-color: #ccc; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #fff; font-size: 1.2rem;
            border: 4px solid #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            /* キャラクター画像を丸く切り抜くための設定 */
            background-size: cover;
            background-position: center top;
        }

        #text-window {
            z-index: 2; background: rgba(0, 0, 0, 0.8); color: #fff;
            padding: 15px; border-radius: 10px; border: 2px solid #fff;
            min-height: 120px; margin-top: 10px;
        }

        #speaker-name { font-weight: bold; color: #f1c40f; margin-bottom: 5px; font-size: 0.9rem; }
        #message-text { font-size: 1rem; line-height: 1.5; white-space: pre-wrap; }

        /* Slack風通知UI */
        #slack-notification {
            position: absolute; top: -100px; left: 10px; right: 10px; z-index: 10;
            background-color: #fff; border-left: 5px solid #4a154b; border-radius: 5px;
            padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #slack-notification.show { top: 15px; }
        .slack-icon { width: 30px; height: 30px; background: #e01e5a; border-radius: 5px; margin-right: 10px; }
        .slack-content h4 { margin: 0; font-size: 0.8rem; color: #333; }
        .slack-content p { margin: 2px 0 0; font-size: 0.9rem; color: #666; }

        /* 下画面（コントローラー・パラメーター） */
        #bottom-screen {
            flex: 1; background-color: #34495e; padding: 15px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* パラメーターUI */
        #status-panel {
            background: #2c3e50; padding: 10px; border-radius: 8px; border: 1px solid #1abc9c;
            display: flex; flex-direction: column; gap: 8px;
        }
        .stat-row { display: flex; align-items: center; }
        .stat-label { color: #ecf0f1; width: 60px; font-size: 0.8rem; font-weight: bold; }
        .stat-bar-container { flex: 1; height: 12px; background: #000; border-radius: 6px; overflow: hidden; border: 1px solid #7f8c8d; }
        #stress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #f1c40f, #e74c3c); transition: width 0.3s; }
        #shachiku-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3498db, #9b59b6); transition: width 0.3s; }

        /* コントローラー（4択ボタン） */
        #controls { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .choice-btn {
            background: linear-gradient(to bottom, #ecf0f1, #bdc3c7);
            border: 2px solid #7f8c8d; border-radius: 10px; font-size: 0.9rem;
            font-weight: bold; color: #2c3e50; cursor: pointer;
            display: flex; align-items: center; justify-content: center; text-align: center;
            padding: 5px; box-shadow: 0 4px 0 #95a5a6; transition: all 0.1s;
        }
        .choice-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #95a5a6; }
        .choice-btn:disabled { opacity: 0.3; pointer-events: none; }
        
        /* エフェクト画面（ゲームオーバー時など） */
        #effect-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: red; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="effect-overlay"></div>

    <div id="top-screen">
        <div id="bg-image"></div>
        
        <div id="slack-notification">
            <div class="slack-icon"></div>
            <div class="slack-content">
                <h4 id="slack-sender">人事部</h4>
                <p id="slack-text">メッセージが届いています。</p>
            </div>
        </div>

        <div id="character-area">
            <div id="character-img" class="character" style="display: none;"></div>
        </div>

        <div id="text-window">
            <div id="speaker-name"></div>
            <div id="message-text">読み込み中...</div>
        </div>
    </div>

    <div id="bottom-screen">
        <div id="status-panel">
            <div class="stat-row">
                <div class="stat-label">ストレス</div>
                <div class="stat-bar-container"><div id="stress-bar"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-label">社畜度</div>
                <div class="stat-bar-container"><div id="shachiku-bar"></div></div>
            </div>
        </div>

        <div id="controls">
            <button class="choice-btn" id="btn-0" onclick="selectChoice(0)"></button>
            <button class="choice-btn" id="btn-1" onclick="selectChoice(1)"></button>
            <button class="choice-btn" id="btn-2" onclick="selectChoice(2)"></button>
            <button class="choice-btn" id="btn-3" onclick="selectChoice(3)"></button>
        </div>
    </div>

    <script>
        /* =========================================
           ゲームエンジン＆状態管理
           ========================================= */
        const state = {
            currentScene: 'title',
            stress: 0,
            shachiku: 0

        const ui = {
            speakerName: document.getElementById('speaker-name'),
            messageText: document.getElementById('message-text'),

            slackNotification: document.getElementById('slack-notification'),
            slackSender: document.getElementById('slack-sender'),
            slackText: document.getElementById('slack-text'),
            stressBar: document.getElementById('stress-bar'),
            shachikuBar: document.getElementById('shachiku-bar'),
            bgImage: document.getElementById('bg-image'),
            overlay: document.getElementById('effect-overlay'),

                document.getElementById('btn-0'),

        // テキストを1文字ずつ表示するためのタイマー管理
        let typeInterval = null;

        /**
         * テキストをタイプライター風に流して表示する関数
         * @param {HTMLElement} element 対象のHTML要素
         * @param {string} text 表示するテキスト
         * @param {number} speed 表示スピード（ミリ秒）
         */
        function typeText(element, text, speed = 30) {
            // 前のタイマーが動いていたらクリアする
            if (typeInterval) {
                clearInterval(typeInterval);
                typeInterval = null;
            }
            
            element.textContent = "";
            let i = 0;
            
            typeInterval = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typeInterval);
                    typeInterval = null;
                }
            }, speed);
        }

            // 総合評価によるエンディング分岐判定

                action: function() {
                    const s = state.stress;
                    const c = state.shachiku;
                    
                    if (s >= 80 && c >= 80) return 'end_legend';
                    if (s >= 80) return 'end_stress';
                    if (c >= 80) return 'end_shachiku';
                    if (s <= 30 && c <= 30) return 'end_peace';
                    
                    return 'end_normal';
                }
            },

            'end_legend': { speaker: "社長", text: "【TRUE END: 鋼の伝説】\nストレスも社畜度も極限まで高まった結果、君は謎の覚醒を遂げた。\nもはや君に限界はない。次期社長は君だ。", bg: "gold", choices: [{ text: "最初から遊ぶ", next: "title" }] },

            'end_normal': { text: "【NORMAL END: 一般社員の日常】\n適度に働き、適度にサボる。\n平凡だが、悪くない社会人生活がこれからも続いていく……。", bg: "lightblue", choices: [{ text: "最初から遊ぶ", next: "title" }] }
        };

        /* =========================================
           ゲームロジック関数
           ========================================= */

        function loadScene(sceneId) {
            const scene = scenario[sceneId];
            state.currentScene = sceneId;

            if (scene.action) {
                const nextId = scene.action();
                loadScene(nextId);
                return;
            }

            // テキストをタイプライター風に表示
            typeText(ui.messageText, scene.text || "");

            if (scene.speaker) {
                ui.speakerName.textContent = scene.speaker;
                ui.speakerName.style.display = "block";
                ui.characterImg.style.display = "flex";
                
                // 画像URLが設定されていれば画像表示、なければ頭文字
                if (scene.charImg) {
                    ui.characterImg.style.backgroundImage = `url('${scene.charImg}')`;
                    ui.characterImg.textContent = "";
                } else {
                    ui.characterImg.style.backgroundImage = "none";
                    ui.characterImg.textContent = scene.speaker.substring(0, 2);
                }
            } else {
                ui.speakerName.style.display = "none";
                ui.characterImg.style.display = "none";
            }

            // 背景画像・エフェクト設定
            if (scene.bg === "red") {
                ui.overlay.style.backgroundColor = "red";
                ui.overlay.style.opacity = "0.5";
                ui.bgImage.style.background = scene.bgImg ? `url('${scene.bgImg}') center/cover no-repeat` : "red";
            } else if (scene.bg === "gold") {
                ui.bgImage.style.background = "linear-gradient(to bottom, #f1c40f, #f39c12)";
                ui.overlay.style.opacity = "0";
            } else if (scene.bg === "lightblue") {
                ui.bgImage.style.background = "linear-gradient(to bottom, #3498db, #2980b9)";
                ui.overlay.style.opacity = "0";
            } else {
                ui.overlay.style.opacity = "0";
                if (scene.bgImg) {
                    ui.bgImage.style.background = `url('${scene.bgImg}') center/cover no-repeat`;
                } else {
                    ui.bgImage.style.background = "linear-gradient(to bottom, #e0f7fa, #b2ebf2)";
                }
            }

            // Slack通知
            if (scene.slack) {
                ui.slackSender.textContent = scene.slack.sender;
                ui.slackText.textContent = scene.slack.text;
                ui.slackNotification.classList.add("show");
                setTimeout(() => {
                    ui.slackNotification.classList.remove("show");
                }, 3500);
            } else {
                ui.slackNotification.classList.remove("show");
            }

            // 選択肢の表示
            const choices = scene.choices || [];
            ui.buttons.forEach((btn, index) => {
                if (index < choices.length) {
                    btn.textContent = choices[index].text;
                    btn.style.display = "flex";
                    btn.disabled = false;
                    btn.onclick = () => selectChoice(index);
                } else {
                    btn.style.display = "none";
                }
            });
        }

        function selectChoice(index) {
            const scene = scenario[state.currentScene];
            const choice = scene.choices[index];

            if (choice.stress) updateStat('stress', choice.stress);
            if (choice.shachiku) updateStat('shachiku', choice.shachiku);

            if (choice.next === 'title' && !choice.comment) {
                state.stress = 0; state.shachiku = 0; updateBars();
                loadScene('title'); return;
            }

            ui.speakerName.style.display = "none";
            // 選択後のコメントもタイプライター風に表示
            typeText(ui.messageText, choice.comment || "（次のシーンへ進みます）");

            if (choice.gameover) {
                ui.overlay.style.backgroundColor = "red";
                ui.overlay.style.opacity = "0.5";
            }

            ui.buttons[0].textContent = "次へ ▶";
            ui.buttons[0].style.display = "flex";
            ui.buttons[0].onclick = () => {
                if (choice.gameover || choice.next === 'title') {
                    state.stress = 0; state.shachiku = 0; updateBars();
                    loadScene('title'); return;
                }

                if (choice.next) {
                    loadScene(choice.next);
                } else {
                    const match = state.currentScene.match(/scene_(\d+)/);
                    if (match) {
                        const nextNum = parseInt(match[1]) + 1;
                        const nextScene = 'scene_' + nextNum;
                        if (scenario[nextScene]) loadScene(nextScene);
                        else loadScene('ending_branch');
                    } else {
                        loadScene('title');
                    }
                }
            };

            for (let i = 1; i < ui.buttons.length; i++) {
                ui.buttons[i].style.display = "none";
            }
        }

        function updateStat(type, amount) {
            state[type] += amount;
            if (state[type] < 0) state[type] = 0;
            if (state[type] > 100) state[type] = 100;
            updateBars();
        }

        function updateBars() {
            ui.stressBar.style.width = state.stress + "%";
            ui.shachikuBar.style.width = state.shachiku + "%";
            if (state.stress > 80) ui.stressBar.style.boxShadow = "0 0 10px red";
            else ui.stressBar.style.boxShadow = "none";
        }

        window.onload = () => {
            updateBars();
            loadScene('title');
        };

    </script>
